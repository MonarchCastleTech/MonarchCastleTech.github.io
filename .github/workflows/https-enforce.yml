name: Enforce HTTPS

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  enforce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enforce HTTPS when certificate is available
        run: node scripts/enforce-pages-https.mjs
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN || github.token }}
          PAGES_REPO: MonarchCastleTech/MonarchCastleTech.github.io
          PAGES_CNAME: monarchcastle.tech
