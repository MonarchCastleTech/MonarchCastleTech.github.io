name: Live Site Health

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check live site routes and data freshness
        run: node scripts/check-live-site.mjs
        env:
          SITE_BASE_URL: http://monarchcastle.tech
          SITE_DATA_MAX_AGE_HOURS: "12"
